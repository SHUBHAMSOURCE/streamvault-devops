version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: streamvault-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: streamvault-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/streamvault
      - PORT=5000
      - JWT_SECRET=devsecret123
      - NODE_ENV=development
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: streamvault-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
